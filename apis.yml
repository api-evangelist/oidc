aid: oidc
name: OIDC
description: >-
  OpenID Connect (OIDC) is an identity layer built on top of OAuth 2.0 that
  enables clients to verify the identity of end-users based on authentication
  performed by an authorization server. It provides a standardized way to
  obtain basic profile information about users through RESTful endpoints
  including discovery, authorization, token, userinfo, and JWKS.
