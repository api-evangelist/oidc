naftiko: 1.0.0-alpha2
info:
  label: OpenID Connect API — Discovery
  description: 'OpenID Connect API — Discovery. 1 operations. Lead operation: OpenID Connect Discovery. Self-contained Naftiko
    capability covering one Oidc business surface.'
  tags:
  - Oidc
  - Discovery
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OIDC_API_KEY: OIDC_API_KEY
capability:
  consumes:
  - type: http
    namespace: oidc-discovery
    baseUri: https://{issuer}
    description: OpenID Connect API — Discovery business capability. Self-contained, no shared references.
    resources:
    - name: .well-known-openid-configuration
      path: /.well-known/openid-configuration
      operations:
      - name: getdiscovery
        method: GET
        description: OpenID Connect Discovery
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.OIDC_API_KEY}}'
  exposes:
  - type: rest
    namespace: oidc-discovery-rest
    port: 8080
    description: REST adapter for OpenID Connect API — Discovery. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/well-known/openid-configuration
      name: well-known-openid-configuration
      description: REST surface for .well-known-openid-configuration.
      operations:
      - method: GET
        name: getdiscovery
        description: OpenID Connect Discovery
        call: oidc-discovery.getdiscovery
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: oidc-discovery-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenID Connect API — Discovery. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: openid-connect-discovery
      description: OpenID Connect Discovery
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: oidc-discovery.getdiscovery
      outputParameters:
      - type: object
        mapping: $.
