naftiko: 1.0.0-alpha2
info:
  label: OpenID Connect API — UserInfo
  description: 'OpenID Connect API — UserInfo. 2 operations. Lead operation: UserInfo Endpoint. Self-contained Naftiko capability
    covering one Oidc business surface.'
  tags:
  - Oidc
  - UserInfo
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OIDC_API_KEY: OIDC_API_KEY
capability:
  consumes:
  - type: http
    namespace: oidc-userinfo
    baseUri: https://{issuer}
    description: OpenID Connect API — UserInfo business capability. Self-contained, no shared references.
    resources:
    - name: userinfo
      path: /userinfo
      operations:
      - name: getuserinfo
        method: GET
        description: UserInfo Endpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: postuserinfo
        method: POST
        description: UserInfo Endpoint (POST)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.OIDC_API_KEY}}'
  exposes:
  - type: rest
    namespace: oidc-userinfo-rest
    port: 8080
    description: REST adapter for OpenID Connect API — UserInfo. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/userinfo
      name: userinfo
      description: REST surface for userinfo.
      operations:
      - method: GET
        name: getuserinfo
        description: UserInfo Endpoint
        call: oidc-userinfo.getuserinfo
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postuserinfo
        description: UserInfo Endpoint (POST)
        call: oidc-userinfo.postuserinfo
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: oidc-userinfo-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenID Connect API — UserInfo. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: userinfo-endpoint
      description: UserInfo Endpoint
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: oidc-userinfo.getuserinfo
      outputParameters:
      - type: object
        mapping: $.
    - name: userinfo-endpoint-post
      description: UserInfo Endpoint (POST)
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: oidc-userinfo.postuserinfo
      outputParameters:
      - type: object
        mapping: $.
